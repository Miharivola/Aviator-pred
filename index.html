<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor App</title>
    <style>
        :root {
            --bg-gray: #f2f2f2;
            --card-bg: #ffffff;
            --input-bg: #e0e6e2;
            --text-green: #2e7d32;
            --text-red: #c62828;
            --primary-red: #d32f2f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            padding: 10px;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tab {
            flex: 1;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            background: none;
            color: #777;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .tab.active {
            background-color: var(--primary-red);
            color: white;
        }

        /* Header Section */
        h1 {
            font-size: 24px;
            color: var(--primary-red);
            margin: 10px 0 5px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Main Card */
        .card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
            text-align: left;
            padding-left: 10px;
        }

        .display-box {
            background-color: var(--input-bg);
            border-radius: 15px;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            color: var(--text-green);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* Button Gradient */
        .btn-calculer {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(to right, #b71c1c, #2e7d32);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .timer-badge {
            display: inline-block;
            background: white;
            border: 2px solid #999;
            border-radius: 8px;
            padding: 3px 10px;
            font-size: 14px;
            color: #444;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Results Section */
        .results-title {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--primary-red);
            display: inline-block;
            padding-bottom: 2px;
        }

        .prediction-list {
            list-style: none;
            padding: 0;
            margin: 10px 0;
        }

        .prediction-list li {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-green);
            margin: 10px 0;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding: 0 10px;
            font-weight: bold;
        }

        .green-text { color: var(--text-green); }
        .red-text { color: var(--text-red); }

    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <button class="tab active">✈️ AVIATOR</button>
        <button class="tab">🚀 COSMOS</button>
        <button class="tab">🛸 JET X</button>
    </div>

    <h1>✈️ AVIATOR ⭐️</h1>
    <div class="subtitle">Prédiction Aviator Studio</div>

    <div class="card">
        <label>🕒 HEURE DU DÉPART</label>
        <div class="display-box" id="departure-time">02 : 20</div>

        <label>🎯 MULTIPLICATEUR CIBLE (+2.00)</label>
        <div class="display-box" id="target-mult">4 . 11</div>

        <button class="btn-calculer" onclick="calculate()">
            <span>🔮</span> CALCULER
        </button>

        <div class="timer-badge" id="current-clock">00:00:00</div>
    </div>

    <div class="card">
        <div class="results-title">✋ HEURES PRÉDITES</div>
        <ul class="prediction-list" id="results">
            <li>1. 02:23:05</li>
            <li>2. 02:24:39</li>
            <li>3. 02:26:45</li>
        </ul>

        <div class="footer-info">
            <span style="color:#aaa; font-size:12px;">SÉCURITÉ DES MISES</span>
            <span class="green-text">x3.16</span>
        </div>
        <div class="footer-info" style="margin-top:5px;">
             <span style="color:#aaa; font-size:12px;">MAX</span>
             <span class="red-text">x13.18</span>
        </div>
    </div>
</div>

<script>
    // Fampisehoana ny ora amin'ny endrika 24h
    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('current-clock').innerText = `${h}:${m}:${s}`;
    }
    
    setInterval(updateClock, 1000);
    updateClock();

    function calculate() {
        // Eto no asiana ny algorithm-nao amin'ny manaraka
        alert("Mikajy ny vinany...");
    }
</script>

</body>
</html>
