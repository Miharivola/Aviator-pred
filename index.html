<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Predictor Pro</title>
    <style>
        :root {
            --bg-gray: #f8f9fa;
            --card-bg: #ffffff;
            --input-bg: #e0e6e2;
            --text-green: #2e7d32;
            --text-red: #c62828;
            --primary-red: #d32f2f;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-gray); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app-container { width: 100%; max-width: 400px; text-align: center; }

        .card { background: var(--card-bg); border-radius: 25px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }

        label { display: block; font-size: 11px; font-weight: bold; color: #555; margin-bottom: 8px; text-align: left; padding-left: 10px; }

        .input-box {
            width: 100%; background-color: var(--input-bg); border: none; border-radius: 15px;
            padding: 15px; font-size: 26px; font-weight: bold; color: var(--text-green);
            text-align: center; margin-bottom: 20px; box-sizing: border-box; outline: none;
        }

        .btn-calculer {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(to right, #b71c1c, #2e7d32);
            color: white; font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .timer-badge { display: inline-block; border: 1.5px solid #ccc; border-radius: 8px; padding: 4px 15px; font-size: 14px; margin-top: 15px; font-weight: bold; background: #fff; }

        #results-section { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .results-title { font-size: 13px; font-weight: bold; color: #666; margin-bottom: 15px; border-bottom: 2px solid var(--primary-red); display: inline-block; }
        
        .prediction-list { list-style: none; padding: 0; margin: 15px 0; }
        .prediction-list li { font-size: 26px; font-weight: bold; color: var(--text-green); margin: 15px 0; border-bottom: 1px dashed #eee; padding-bottom: 5px; }

        .footer-info { display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold; font-size: 13px; }
        .green-text { color: var(--text-green); }
        .red-text { color: var(--text-red); }
        .orange-text { color: #f57c00; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <label>🕒 HEURE DU DÉPART</label>
        <input type="text" class="input-box" id="input-time" placeholder="HH:MM" value="06:00">

        <label>🎯 MULTIPLICATEUR CIBLE (+2.00)</label>
        <input type="text" class="input-box" id="input-mult" value="7.78">

        <button class="btn-calculer" onclick="calculate()">🔮 CALCULER</button>
        <div class="timer-badge" id="current-clock">00:00:00</div>
    </div>

    <div class="card" id="results-section">
        <div class="results-title">✋ HEURES PRÉDITES</div>
        <ul class="prediction-list" id="prediction-list"></ul>

        <div class="footer-info">
            <span style="color:#aaa;">SÉCURITÉ DES MISES</span>
            <span class="green-text">x3.16</span>
        </div>
        <div class="footer-info">
            <span style="color:#aaa;">CÔTE MOYEN</span>
            <span class="orange-text">x8.50</span>
        </div>
        <div class="footer-info">
            <span style="color:#aaa;">CÔTE RISQUÉ</span>
            <span class="red-text">x13.18</span>
        </div>
    </div>
</div>

<script>
    // Fampisehoana ny ora 24h
    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('current-clock').innerText = `${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function calculate() {
        const inputVal = document.getElementById('input-time').value;
        const parts = inputVal.split(':');
        
        if (parts.length < 2) {
            alert("Azafady, ampidiro HH:MM (ohatra: 06:01)");
            return;
        }

        let h = parseInt(parts[0]);
        let m = parseInt(parts[1]);

        document.getElementById('results-section').style.display = 'block';
        const list = document.getElementById('prediction-list');
        list.innerHTML = ""; 

        // Elanelana minitra kisendrasendra
        let baseMins = [2, 5, 8]; 

        baseMins.forEach((gap, i) => {
            let resM = m + gap + Math.floor(Math.random() * 2); // Ampiana kely random
            let resH = h;
            
            if (resM >= 60) {
                resM -= 60;
                resH = (resH + 1) % 24;
            }

            const hh = String(resH).padStart(2, '0');
            const mm = String(resM).padStart(2, '0');
            const ss = String(Math.floor(Math.random() * 60)).padStart(2, '0');

            list.innerHTML += `<li>${i + 1}. ${hh}:${mm}:${ss}</li>`;
        });
    }
</script>

</body>
</html>
