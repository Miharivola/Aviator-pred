<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor Pro</title>
    <style>
        :root {
            --bg-gray: #f2f2f2;
            --card-bg: #ffffff;
            --input-bg: #e0e6e2;
            --text-green: #2e7d32;
            --text-red: #c62828;
            --primary-red: #d32f2f;
        }

        body { font-family: sans-serif; background-color: var(--bg-gray); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app-container { width: 100%; max-width: 380px; text-align: center; }

        .tabs { display: flex; background: #fff; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .tab { flex: 1; padding: 10px; font-size: 12px; font-weight: bold; border: none; background: none; color: #777; cursor: pointer; }
        .tab.active { background-color: var(--primary-red); color: white; }

        h1 { font-size: 24px; color: var(--primary-red); margin: 10px 0 5px 0; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }

        .card { background: var(--card-bg); border-radius: 25px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }

        label { display: block; font-size: 11px; font-weight: bold; color: #555; margin-bottom: 8px; text-align: left; padding-left: 10px; }

        /* Natao INPUT fa tsy DIV intsony mba ho azo kitihina */
        .input-box {
            width: 100%;
            background-color: var(--input-bg);
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-size: 26px;
            font-weight: bold;
            color: var(--text-green);
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        .btn-calculer {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(to right, #b71c1c, #2e7d32);
            color: white; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        .timer-badge { display: inline-block; border: 1.5px solid #999; border-radius: 8px; padding: 3px 12px; font-size: 14px; margin-top: 15px; font-weight: bold; }

        /* Miafina ny valiny amin'ny voalohany */
        #results-section { display: none; }

        .results-title { font-size: 13px; font-weight: bold; color: #666; margin-bottom: 10px; border-bottom: 2px solid var(--primary-red); display: inline-block; }
        .prediction-list { list-style: none; padding: 0; margin: 15px 0; }
        .prediction-list li { font-size: 24px; font-weight: bold; color: var(--text-green); margin: 12px 0; }

        .footer-info { display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold; font-size: 13px; }
        .green-text { color: var(--text-green); }
        .red-text { color: var(--text-red); }
        .orange-text { color: #f57c00; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <button class="tab active">✈️ AVIATOR</button>
        <button class="tab">🚀 COSMOS</button>
    </div>

    <h1>✈️ AVIATOR ⭐️</h1>
    <div class="subtitle">Prédiction Aviator Studio</div>

    <div class="card">
        <label>🕒 HEURE DU DÉPART</label>
        <input type="text" class="input-box" id="input-time" value="02 : 20">

        <label>🎯 MULTIPLICATEUR CIBLE (+2.00)</label>
        <input type="text" class="input-box" id="input-mult" value="4 . 11">

        <button class="btn-calculer" onclick="calculate()">🔮 CALCULER</button>

        <div class="timer-badge" id="current-clock">00:00:00</div>
    </div>

    <div class="card" id="results-section">
        <div class="results-title">✋ HEURES PRÉDITES</div>
        <ul class="prediction-list" id="prediction-list">
            </ul>

        <div class="footer-info">
            <span style="color:#aaa;">SÉCURITÉ DES MISES</span>
            <span class="green-text">x3.16</span>
        </div>
        <div class="footer-info">
            <span style="color:#aaa;">CÔTE MOYEN</span>
            <span class="orange-text">x8.50</span>
        </div>
        <div class="footer-info">
            <span style="color:#aaa;">CÔTE RISQUÉ</span>
            <span class="red-text">x13.18</span>
        </div>
    </div>
</div>

<script>
    // Fampisehoana ny ora 24h
    function updateClock() {
        const now = new Date();
        document.getElementById('current-clock').innerText = 
            now.toLocaleTimeString('fr-FR', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Rehefa mitsindry "CALCULER"
    function calculate() {
        // Mampiseho ny faritra misy ny valiny
        document.getElementById('results-section').style.display = 'block';
        
        // Eto no asiana ny lojika hamoronana ora vaovao (ohatra fotsiny ireto)
        const list = document.getElementById('prediction-list');
        list.innerHTML = `
            <li>1. 02:23:05</li>
            <li>2. 02:24:39</li>
            <li>3. 02:26:45</li>
        `;
    }
</script>

</body>
</html>
